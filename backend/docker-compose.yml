version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logi_cam
      MYSQL_USER: logitech
      MYSQL_PASSWORD: logitech
    ports:
      - "3307:3306"
    volumes:
      - ./docker-init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: logitech
      DB_PASSWORD: logitech
      DB_NAME: logi_cam
      DB_PORT: 3306
      PORT: 3000
      JWT_SECRET: unechainedecaracteresecrete123
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
